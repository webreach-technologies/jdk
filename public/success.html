<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="5; url=https://jdktransportation.com/">
<title>Booking Confirmed | JDK Transportation</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: 'Poppins', sans-serif;
}

body{
  background:#f3f4f6;
  color:#111;
}

.success-wrapper{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:40px 20px;
}

.success-card{
  max-width:750px;
  width:100%;
  text-align:center;
  padding:60px 40px;
  border-radius:20px;
  background:#fff;
  box-shadow:0 20px 60px rgba(0,0,0,0.08);
  position:relative;
}

/* Gold Top Accent */
.success-card::before{
  content:"";
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:6px;
  background-color:#f5b417;
  border-top-left-radius:20px;
  border-top-right-radius:20px;
}

.checkmark{
  width:100px;
  height:100px;
  border-radius:50%;
  margin:0 auto 30px;
  background-color:#f5b417;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:48px;
  color:#000;
  box-shadow:0 10px 30px rgba(255,193,7,0.4);
  animation: fadeScale 0.6s ease forwards;
}

h1{
  font-size:36px;
  font-weight:800;
  margin-bottom:20px;
  color:#111;
}

.highlight{
  color:#f5b417;
}

p{
  font-size:17px;
  color:#555;
  line-height:1.8;
}

@keyframes fadeScale{
  from{opacity:0; transform:scale(0.8);}
  to{opacity:1; transform:scale(1);}
}

@media(max-width:768px){
  h1{font-size:26px;}
  .success-card{padding:40px 25px;}
}
</style>
</head>
<body>

<div class="success-wrapper">

  <div class="success-card">

    <div class="checkmark">✓</div>

    <h1>
      Thank You for Choosing 
      <span class="highlight">JDK Transportation</span>
    </h1>

    <p>
      Your quote request has been successfully submitted.
      Our team is reviewing your details and will contact you shortly
      with a personalized charter solution tailored to your needs.
    </p>


  </div>

</div>

</body>
</html>
