<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found | JDK Transportation</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins', sans-serif;
}

body{
  background:#f3f4f6;
  color:#111;
}

.wrapper{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:40px 20px;
}

.card{
  max-width:750px;
  width:100%;
  text-align:center;
  padding:70px 40px;
  border-radius:20px;
  background:#fff;
  box-shadow:0 20px 60px rgba(0,0,0,0.08);
  position:relative;
}

/* Gold Accent Top */
.card::before{
  content:"";
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:6px;
  background-color:#f5b417;
  border-top-left-radius:20px;
  border-top-right-radius:20px;
}

.error-code{
  font-size:110px;
  font-weight:800;
  color:#f5b417;
  line-height:1;
  margin-bottom:20px;
  letter-spacing:3px;
  animation: fadeScale 0.6s ease forwards;
}

h1{
  font-size:30px;
  font-weight:700;
  margin-bottom:15px;
}

p{
  font-size:17px;
  color:#555;
  line-height:1.8;
  margin-bottom:35px;
}

.btn-group{
  display:flex;
  justify-content:center;
  gap:20px;
  flex-wrap:wrap;
}

.btn{
  padding:14px 35px;
  border-radius:50px;
  font-weight:600;
  text-decoration:none;
  transition:0.3s;
}

.btn-primary{
  background:#f5b417;
  color:#000;
}

.btn-primary:hover{
  background:#f5b21785;
}

.btn-outline{
  border:2px solid #111;
  color:#111;
}

.btn-outline:hover{
  background:#111;
  color:#fff;
}

.footer-note{
  margin-top:40px;
  font-size:14px;
  color:#777;
}

@keyframes fadeScale{
  from{opacity:0; transform:scale(0.8);}
  to{opacity:1; transform:scale(1);}
}

@media(max-width:768px){
  .error-code{font-size:70px;}
  h1{font-size:22px;}
  .card{padding:50px 25px;}
}
</style>
</head>
<body>

<div class="wrapper">

  <div class="card">

    <div class="error-code">404</div>

    <h1>Page Not Found</h1>

    <p>
      The page you’re looking for doesn’t exist or may have been moved.
      Please return to the homepage or contact our team for assistance.
    </p>

    <div class="btn-group">
      <a href="https://jdktransportation.com/" class="btn btn-primary">Back to Homepage</a>
      
    </div>

  </div>

</div>

</body>
</html>
